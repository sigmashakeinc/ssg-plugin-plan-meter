<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Plan Meter</title>
		<style>
			:root { color-scheme: dark; }
			body {
				margin: 0;
				font: 14px/1.5 system-ui, sans-serif;
				background: #0b0d10;
				color: #e6e8eb;
				padding: 20px;
			}
			h1 { font-size: 16px; margin: 0 0 16px; }
			.tier {
				display: inline-block; padding: 4px 12px; border-radius: 999px;
				font-weight: 600; background: #11203b; color: #bfdbfe; border: 1px solid #1e3a5f;
			}
			.bar {
				height: 12px; background: #14171c; border: 1px solid #232a31;
				border-radius: 999px; overflow: hidden; margin: 14px 0 6px;
			}
			.fill { height: 100%; background: linear-gradient(90deg, #34d399, #3b82f6); width: 0; transition: width .4s; }
			.fill.hot { background: linear-gradient(90deg, #fbbf24, #f87171); }
			.stat { font-variant-numeric: tabular-nums; }
			.muted { color: #8a939c; font-size: 12px; }
			.grid { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
			.box { flex: 1 1 120px; background: #14171c; border: 1px solid #232a31; border-radius: 10px; padding: 12px; }
			.box .n { font-size: 22px; font-weight: 700; }
			.box .l { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #8a939c; }
		</style>
	</head>
	<body>
		<h1>Plan Meter</h1>
		<div>Plan: <span class="tier" id="tier">…</span></div>

		<div class="bar"><div class="fill" id="fill"></div></div>
		<div class="muted" id="usage">loading usage…</div>

		<div class="grid">
			<div class="box"><div class="n stat" id="today">–</div><div class="l">evals today</div></div>
			<div class="box"><div class="n stat" id="limit">–</div><div class="l">daily limit</div></div>
		</div>

		<script type="module">
			// Reference plugin — see @sigmashake/plugin-sdk for the typed client.
			const cfg = window.__SSG_PLUGIN_CONFIG__ || {};
			async function api(path) {
				const r = await fetch(path, {
					headers: { Accept: "application/json", "X-SigmaShake-Token": cfg.token || "" },
				});
				if (!r.ok) throw new Error("HTTP " + r.status);
				return r.json();
			}
			(async () => {
				try {
					const l = await api("/api/json/license");
					document.getElementById("tier").textContent = l.tier_label || l.tier || "Free";
					const today = l.evals_today ?? 0;
					const limit = l.eval_daily_limit; // null = unlimited
					document.getElementById("today").textContent = today.toLocaleString();
					document.getElementById("limit").textContent =
						limit === null || limit === undefined ? "∞" : limit.toLocaleString();
					const pct = l.pct_used == null ? (limit ? Math.min(100, (today / limit) * 100) : 0) : l.pct_used;
					const fill = document.getElementById("fill");
					fill.style.width = (limit ? pct : 100) + "%";
					if (pct >= 80) fill.classList.add("hot");
					document.getElementById("usage").textContent =
						limit === null || limit === undefined
							? "Unlimited evals on this plan."
							: Math.round(pct) + "% of today's " + limit.toLocaleString() + " eval budget used.";
				} catch (e) {
					document.getElementById("usage").textContent = "Could not load plan: " + e.message;
				}
			})();
		</script>
	</body>
</html>
